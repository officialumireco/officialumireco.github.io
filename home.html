<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>

        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 12px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 5px;
            border-color: red 1px solid;
            font-size: 16px;
        }

    </style>

</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        <strong>3D Model Viewer</strong><br>
        Model: odm_textured_model_geo.obj
    </div>
    <div id="controls">
        <strong>Controls:</strong><br>
        • Left click + drag: Rotate<br>
        • Right click + drag: Pan<br>
        • Scroll: Zoom
    </div>
    <div id="loading">Loading model...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        const loadingDiv = document.getElementById('loading');

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2a2a2a);

            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.x = 0;
            camera.position.z = 0;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight2.position.set(-10, -10, -10);
            scene.add(directionalLight2);

            // OrbitControls implementation
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Load model
            loadModel();

            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);

            // Start animation loop
            animate();
        }

        function loadModel() {
            const mtlLoader = new THREE.MTLLoader();
            //mtlLoader.setPath("{{ url_for('static', filename='models/') }}");
            mtlLoader.load('https://umi-reco.main.jp/wp-content/uploads/3d-models/1/odm_textured_model_geo.mtl', function(materials) {
                materials.preload();

                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);
                objLoader.setPath("{{ url_for('static', filename='models/') }}");

                objLoader.load(
                    'odm_textured_model_geo.obj',
                    function(object) {
                        // Center the model
                        const box = new THREE.Box3().setFromObject(object);
                        const center = box.getCenter(new THREE.Vector3());

                        // Scale the model to fit in view
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 10 / maxDim;
                        object.scale.multiplyScalar(scale);

                        scene.add(object);
                        loadingDiv.style.display = 'none';
                    },
                    function(xhr) {
                        console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                    },
                    function(error) {
                        console.error('Error loading OBJ:', error);
                        loadingDiv.innerHTML = 'Error loading model';
                    }
                );
            }, undefined, function(error) {
                console.error('Error loading MTL:', error);
                loadingDiv.innerHTML = 'Error loading materials';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Simple OrbitControls implementation
        class OrbitControls {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement;
                this.enableDamping = false;
                this.dampingFactor = 0.05;
                
                this.rotateSpeed = 1.0;
                this.zoomSpeed = 1.0;
                this.panSpeed = 1.0;
                
                this.isRotating = false;
                this.isPanning = false;
                this.previousMousePosition = { x: 0, y: 0 };
                
                this.spherical = { radius: 5, theta: 0, phi: Math.PI / 2 };
                this.target = new THREE.Vector3(0, 0, 0);
                
                this.setupEventListeners();
                this.update();
            }
            
            setupEventListeners() {
                this.domElement.addEventListener('mousedown', this.onMouseDown.bind(this));
                this.domElement.addEventListener('mousemove', this.onMouseMove.bind(this));
                this.domElement.addEventListener('mouseup', this.onMouseUp.bind(this));
                this.domElement.addEventListener('wheel', this.onMouseWheel.bind(this));
                this.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            
            onMouseDown(e) {
                if (e.button === 0) this.isRotating = true;
                if (e.button === 2) this.isPanning = true;
                this.previousMousePosition = { x: e.clientX, y: e.clientY };
            }
            
            onMouseMove(e) {
                const deltaX = e.clientX - this.previousMousePosition.x;
                const deltaY = e.clientY - this.previousMousePosition.y;
                
                if (this.isRotating) {
                    this.spherical.theta -= deltaX * 0.01 * this.rotateSpeed;
                    this.spherical.phi -= deltaY * 0.01 * this.rotateSpeed;
                    this.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this.spherical.phi));
                }
                
                if (this.isPanning) {
                    const panX = -deltaX * 0.01 * this.panSpeed;
                    const panY = deltaY * 0.01 * this.panSpeed;
                    
                    const right = new THREE.Vector3();
                    const up = new THREE.Vector3();
                    this.camera.getWorldDirection(right);
                    right.cross(this.camera.up).normalize();
                    up.copy(this.camera.up).normalize();
                    
                    this.target.add(right.multiplyScalar(panX));
                    this.target.add(up.multiplyScalar(panY));
                }
                
                this.previousMousePosition = { x: e.clientX, y: e.clientY };
            }
            
            onMouseUp(e) {
                this.isRotating = false;
                this.isPanning = false;
            }
            
            onMouseWheel(e) {
                e.preventDefault();
                this.spherical.radius += e.deltaY * 0.01 * this.zoomSpeed;
                this.spherical.radius = Math.max(0.5, Math.min(50, this.spherical.radius));
            }
            
            update() {
                const x = this.spherical.radius * Math.sin(this.spherical.phi) * Math.sin(this.spherical.theta);
                const y = this.spherical.radius * Math.cos(this.spherical.phi);
                const z = this.spherical.radius * Math.sin(this.spherical.phi) * Math.cos(this.spherical.theta);
                
                this.camera.position.set(
                    this.target.x + x,
                    this.target.y + y,
                    this.target.z + z
                );
                this.camera.lookAt(this.target);
            }
        }

        // MTLLoader implementation
        THREE.MTLLoader = function() {
            this.path = '';
        };

        THREE.MTLLoader.prototype = {
            setPath: function(path) {
                this.path = path;
            },
            
            load: function(url, onLoad, onProgress, onError) {
                fetch(this.path + url)
                    .then(response => response.text())
                    .then(text => {
                        const materials = this.parse(text);
                        onLoad(materials);
                    })
                    .catch(onError);
            },
            
            parse: function(text) {
                const lines = text.split('\n');
                const materials = {};
                let currentMaterial = null;
                
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('newmtl ')) {
                        currentMaterial = line.substring(7).trim();
                        materials[currentMaterial] = {
                            color: new THREE.Color(0xffffff),
                            map: null
                        };
                    } else if (line.startsWith('Kd ') && currentMaterial) {
                        const parts = line.split(/\s+/);
                        materials[currentMaterial].color = new THREE.Color(
                            parseFloat(parts[1]),
                            parseFloat(parts[2]),
                            parseFloat(parts[3])
                        );
                    } else if (line.startsWith('map_Kd ') && currentMaterial) {
                        const texturePath = line.substring(7).trim();
                        materials[currentMaterial].map = texturePath;
                    }
                }
                
                return {
                    materials: materials,
                    preload: function() {
                        const loader = new THREE.TextureLoader();
                        loader.setPath('/models/');
                        for (let name in this.materials) {
                            if (this.materials[name].map) {
                                this.materials[name].mapTexture = loader.load(this.materials[name].map);
                            }
                        }
                    }
                };
            }
        };

        // OBJLoader implementation
        THREE.OBJLoader = function() {
            this.materials = null;
            this.path = '';
        };

        THREE.OBJLoader.prototype = {
            setPath: function(path) {
                this.path = path;
            },
            
            setMaterials: function(materials) {
                this.materials = materials.materials;
            },
            
            load: function(url, onLoad, onProgress, onError) {
                fetch(this.path + url)
                    .then(response => response.text())
                    .then(text => {
                        const object = this.parse(text);
                        onLoad(object);
                    })
                    .catch(onError);
            },
            
            parse: function(text) {
                const lines = text.split('\n');
                const vertices = [];
                const normals = [];
                const uvs = [];
                const faces = [];
                let currentMaterial = null;
                
                for (let line of lines) {
                    line = line.trim();
                    const parts = line.split(/\s+/);
                    
                    if (parts[0] === 'v') {
                        vertices.push(parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3]));
                    } else if (parts[0] === 'vn') {
                        normals.push(parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3]));
                    } else if (parts[0] === 'vt') {
                        uvs.push(parseFloat(parts[1]), parseFloat(parts[2]));
                    } else if (parts[0] === 'usemtl') {
                        currentMaterial = parts[1];
                    } else if (parts[0] === 'f') {
                        faces.push({ indices: parts.slice(1), material: currentMaterial });
                    }
                }
                
                return this.buildMesh(vertices, normals, uvs, faces);
            },
            
            buildMesh: function(vertices, normals, uvs, faces) {
                const group = new THREE.Group();
                const geometryByMaterial = {};
                
                for (let face of faces) {
                    const material = face.material || 'default';
                    if (!geometryByMaterial[material]) {
                        geometryByMaterial[material] = {
                            vertices: [],
                            normals: [],
                            uvs: []
                        };
                    }
                    
                    const geom = geometryByMaterial[material];
                    
                    for (let i = 0; i < face.indices.length; i++) {
                        const parts = face.indices[i].split('/');
                        const vIdx = parseInt(parts[0]) - 1;
                        const vtIdx = parts[1] ? parseInt(parts[1]) - 1 : -1;
                        const vnIdx = parts[2] ? parseInt(parts[2]) - 1 : -1;
                        
                        geom.vertices.push(vertices[vIdx * 3], vertices[vIdx * 3 + 1], vertices[vIdx * 3 + 2]);
                        
                        if (vnIdx >= 0) {
                            geom.normals.push(normals[vnIdx * 3], normals[vnIdx * 3 + 1], normals[vnIdx * 3 + 2]);
                        }
                        
                        if (vtIdx >= 0) {
                            geom.uvs.push(uvs[vtIdx * 2], uvs[vtIdx * 2 + 1]);
                        }
                    }
                }
                
                for (let matName in geometryByMaterial) {
                    const geomData = geometryByMaterial[matName];
                    const geometry = new THREE.BufferGeometry();
                    
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(geomData.vertices, 3));
                    if (geomData.normals.length > 0) {
                        geometry.setAttribute('normal', new THREE.Float32BufferAttribute(geomData.normals, 3));
                    } else {
                        geometry.computeVertexNormals();
                    }
                    if (geomData.uvs.length > 0) {
                        geometry.setAttribute('uv', new THREE.Float32BufferAttribute(geomData.uvs, 2));
                    }
                    
                    let material;
                    if (this.materials && this.materials[matName]) {
                        const mat = this.materials[matName];
                        material = new THREE.MeshPhongMaterial({
                            color: mat.color,
                            map: mat.mapTexture || null
                        });
                    } else {
                        material = new THREE.MeshPhongMaterial({ color: 0xcccccc });
                    }
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    group.add(mesh);
                }
                
                return group;
            }
        };

        init();
    </script>
</body>
</html>
